<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>StudentApp</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0e0f13; --surface: #16181f; --surface2: #1e2029;
            --border: rgba(255,255,255,0.07); --accent: #6c63ff; --accent2: #ff6584;
            --text: #e8eaf0; --muted: #7b7f8e; --danger: #f87171; --radius: 14px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before { content:''; position:fixed; top:-200px; left:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%); pointer-events:none; z-index:0; }
        body::after  { content:''; position:fixed; bottom:-200px; right:-200px; width:500px; height:500px; background:radial-gradient(circle, rgba(255,101,132,0.08) 0%, transparent 70%); pointer-events:none; z-index:0; }
        .wrapper { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:48px 24px; }
        .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; animation:fadeDown 0.5s ease both; }
        .header-left .label { font-size:11px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
        .header-left h1 { font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:700; line-height:1.1; }
        .header-left h1 span { color:var(--accent); }
        .btn-add { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#fff; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; padding:11px 22px; border-radius:50px; text-decoration:none; transition:transform 0.18s,box-shadow 0.18s,background 0.18s; box-shadow:0 4px 20px rgba(108,99,255,0.35); white-space:nowrap; }
        .btn-add:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(108,99,255,0.5); background:#7c75ff; }
        .btn-add svg { width:16px; height:16px; }
        .stats { display:flex; gap:16px; margin-bottom:32px; animation:fadeDown 0.5s 0.1s ease both; }
        .stat-card { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; display:flex; align-items:center; gap:14px; }
        .stat-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
        .stat-icon.purple { background:rgba(108,99,255,0.15); }
        .stat-icon.pink   { background:rgba(255,101,132,0.15); }
        .stat-icon.green  { background:rgba(74,222,128,0.15); }
        .stat-value { font-size:1.6rem; font-weight:600; line-height:1; }
        .stat-label { font-size:12px; color:var(--muted); margin-top:3px; }
        .search-wrap { position:relative; margin-bottom:24px; animation:fadeDown 0.5s 0.15s ease both; }
        .search-wrap svg { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); width:18px; height:18px; }
        #searchInput { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:50px; padding:13px 20px 13px 46px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
        #searchInput:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,0.15); }
        #searchInput::placeholder { color:var(--muted); }
        .table-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; animation:fadeUp 0.5s 0.2s ease both; }
        table { width:100%; border-collapse:collapse; }
        thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
        th { padding:14px 20px; font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); text-align:left; }
        tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:rgba(108,99,255,0.04); }
        td { padding:16px 20px; font-size:14px; vertical-align:middle; }
        .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent2)); display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:#fff; margin-right:10px; flex-shrink:0; }
        .name-cell { display:flex; align-items:center; }
        .name-text { font-weight:500; }
        .email-link { color:var(--muted); text-decoration:none; transition:color 0.15s; }
        .email-link:hover { color:var(--accent); }
        .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:50px; font-size:12px; font-weight:500; background:rgba(108,99,255,0.12); color:#a89dff; border:1px solid rgba(108,99,255,0.2); }
        .badge.no-course { background:rgba(255,101,132,0.1); color:#ff9aad; border-color:rgba(255,101,132,0.2); }
        .badge-dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:0.7; }
        .actions { display:flex; gap:8px; }
        .btn-edit, .btn-del { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:8px; font-size:12px; font-weight:500; text-decoration:none; transition:all 0.15s; border:1px solid transparent; cursor:pointer; background:none; font-family:'DM Sans',sans-serif; }
        .btn-edit { color:var(--accent); background:rgba(108,99,255,0.1); border-color:rgba(108,99,255,0.2); }
        .btn-edit:hover { background:rgba(108,99,255,0.2); transform:translateY(-1px); }
        .btn-del { color:var(--danger); background:rgba(248,113,113,0.08); border-color:rgba(248,113,113,0.2); }
        .btn-del:hover { background:rgba(248,113,113,0.18); transform:translateY(-1px); }
        .btn-edit svg, .btn-del svg { width:13px; height:13px; }
        #noResults { display:none; }
        #noResults td { text-align:center; color:var(--muted); padding:40px; font-size:14px; }
        .empty-state { text-align:center; padding:64px 24px; }
        .empty-state .emoji { font-size:48px; margin-bottom:16px; }
        .empty-state p { color:var(--muted); font-size:15px; }
        @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
        @media (max-width:640px) { .stats{flex-direction:column;} .header{flex-direction:column;align-items:flex-start;gap:16px;} th:nth-child(2),td:nth-child(2){display:none;} }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <div class="header-left">
            <div class="label">Dashboard</div>
            <h1>Student <span>Registry</span></h1>
        </div>
        <a href="/add" class="btn-add">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Add Student
        </a>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-icon purple">🎓</div>
            <div>
                <div class="stat-value" th:text="${#lists.size(students)}">0</div>
                <div class="stat-label">Total Students</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon pink">📚</div>
            <div>
                <div class="stat-value" th:text="${#lists.size(students.?[course != null])}">0</div>
                <div class="stat-label">Enrolled</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green">⏳</div>
            <div>
                <div class="stat-value" th:text="${#lists.size(students.?[course == null])}">0</div>
                <div class="stat-label">Unenrolled</div>
            </div>
        </div>
    </div>

    <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        <input type="text" id="searchInput" placeholder="Search by name, email or course…"/>
    </div>

    <div class="table-card" th:if="${not #lists.isEmpty(students)}">
        <table id="studentTable">
            <thead>
            <tr>
                <th>Student</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}" class="student-row">
                <td>
                    <div class="name-cell">
                        <div class="avatar" th:text="${#strings.substring(s.name,0,1).toUpperCase()}">A</div>
                        <span class="name-text" th:text="${s.name}">Name</span>
                    </div>
                </td>
                <td><a class="email-link" th:href="'mailto:' + ${s.email}" th:text="${s.email}">email</a></td>
                <td>
                        <span th:if="${s.course != null}" class="badge">
                            <span class="badge-dot"></span>
                            <span th:text="${s.course.title}">Course</span>
                        </span>
                    <span th:if="${s.course == null}" class="badge no-course">
                            <span class="badge-dot"></span>
                            No Course
                        </span>
                </td>
                <td>
                    <div class="actions">
                        <a th:href="@{'/edit/' + ${s.id}}" class="btn-edit">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 11l6-6 3 3-6 6H9v-3z"/></svg>
                            Edit
                        </a>
                        <a th:href="@{'/delete/' + ${s.id}}" onclick="return confirm('Delete this student?')" class="btn-del">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            Delete
                        </a>
                    </div>
                </td>
            </tr>
            <tr id="noResults"><td colspan="4">No students match your search.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(students)}">
        <div class="emoji">🎓</div>
        <p>No students yet. <a href="/add" style="color:var(--accent)">Add the first one!</a></p>
    </div>
</div>
<script>
    const input = document.getElementById('searchInput');
    if (input) {
        input.addEventListener('input', () => {
            const q = input.value.toLowerCase();
            const rows = document.querySelectorAll('.student-row');
            let anyVisible = false;
            rows.forEach(row => {
                const show = row.textContent.toLowerCase().includes(q);
                row.style.display = show ? '' : 'none';
                if (show) anyVisible = true;
            });
            document.getElementById('noResults').style.display = anyVisible ? 'none' : '';
        });
    }
</script>
</body>
</html>
